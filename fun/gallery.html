<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>wired_maya's Home</title>
        <link rel="icon" href="/assets/logos/cat eye.svg" type="image/svg+xml">

        <link href="/styles/main.css" rel="stylesheet" type="text/css" media="all">

        <script src="/js/crt-overlay.js" type="module"></script>

        <script src="/js/animations.js" type="module"></script>

    <body>
        <div class="nav-container">
            <a class="nav-left" href="/index.html">* [return home]</a>

        <div class="gallery-card">
            <h1>My cat! :D</h1>
            <h3>Rest in Peace, Piper <3</h3>

                <button class="gallery-arrow-left" onclick="kittyGallery.scrollGallery(-1)"><</button>
                <img id="kittyImgElement" class="gallery-img">

        </div>
