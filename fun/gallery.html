<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Gallery</title>
        <link rel="icon" href="/assets/cat eye.svg" type="image/svg+xml">

        <link href="/styles/main.css" rel="stylesheet" type="text/css" media="all">
        <script src="/src/crt-overlay.js" type="module"></script>
    </head>
    <body>
        <a href="/index.html" class="back-button">back</a>
        <h2>My cat! :D</h2>
        <button class="button" onclick="scrollGallery(-1);">&lt;</button>
        <h4 id="gallerySlider" style="display: inline; user-select: none;"></h4>
        <button class="button" onclick="scrollGallery(1);">&gt;</button>
        <img id="galleryImg" class="gallery-img" style="width: 20%; margin: 40px auto">

        <script>
            var i = 0;
            var images = [
                "PXL_20230215_210425193.jpg",
                "PXL_20230303_222245983.jpg",
                "PXL_20230303_222307987.jpg",
                "PXL_20230425_211841997.jpg",
                "PXL_20230425_211932289.jpg",
                "PXL_20230425_212031667.MP.jpg",
                "PXL_20230601_155407214.jpg",
                "PXL_20230720_020921585.MP.jpg",
                "PXL_20230720_020945077.MP.jpg",
                "PXL_20230722_041157156.MP.jpg",
                "PXL_20230801_001157041.jpg"
            ];
            var img = document.getElementById("galleryImg");
            var slider = document.getElementById("gallerySlider");

            // Init state
            scrollGallery(0);

            function scrollGallery(offset) {
                i += offset;
                if (i >= images.length) i = 0;
                if (i <= -1) i = images.length - 1;

                img.src = "/assets/" + images[i];
                slider.innerHTML = "-".repeat(i) + "|" + "-".repeat(images.length - 1 - i);
            }
        </script>
    </body>
</html>
