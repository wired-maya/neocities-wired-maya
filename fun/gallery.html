<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>wired_maya's Home</title>
        <link rel="icon" href="/assets/logos/cat eye.svg" type="image/svg+xml">

        <link href="/styles/main.css" rel="stylesheet" type="text/css" media="all">

        <script src="/js/crt-overlay.js" type="module"></script>
        <script src="/js/page-transition.js" type="module"></script>
        <script src="/js/animations.js" type="module"></script>
    </head>
    <body>
        <div class="nav-container">
            <a class="nav-left" href="/index.html">* [return home]</a>
            <a class="nav-middle" href="/settings.html">% [settings]</a>
            <a class="nav-right" href="./">^ [go up]</a>
        </div>
        
        <div class="gallery-card">
            <h1>My cat! :D</h1>
            <h3>Rest in Peace, Piper <3</h3>
            <input id="gallerySlider" class="gallery-slider" type="range" min="0" max="10" onchange="setGallery(this.value)" />
            <div class="gallery-img-container">
                <button class="gallery-arrow-left" onclick="scrollGallery(-1)"><</button>
                <img id="galleryImg" class="gallery-img">
                <button class="gallery-arrow-right" onclick="scrollGallery(1)">></button>
            </div>
        </div>

        <script>
            var i = 0;
            var images = [
                "PXL_20230215_210425193.jpg",
                "PXL_20230303_222245983.jpg",
                "PXL_20230303_222307987.jpg",
                "PXL_20230425_211841997.jpg",
                "PXL_20230425_211932289.jpg",
                "PXL_20230425_212031667.MP.jpg",
                "PXL_20230601_155407214.jpg",
                "PXL_20230720_020921585.MP.jpg",
                "PXL_20230720_020945077.MP.jpg",
                "PXL_20230722_041157156.MP.jpg",
                "PXL_20230801_001157041.jpg"
            ];
            var img = document.getElementById("galleryImg");
            var slider = document.getElementById("gallerySlider");

            // Init state
            setGallery(i);

            function scrollGallery(offset) {
                i += offset;
                if (i >= images.length) i = 0;
                if (i <= -1) i = images.length - 1;

                setGallery(i);
            }

            function setGallery(pos) {
                i = parseInt(pos);

                slider.value = i;
                img.src = "/assets/gallery/my-cat/" + images[i];
            }
        </script>
    </body>
</html>
